<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnicerias - El Sabrosón</title>

<style>
body{
    font-family: Arial;
    padding: 20px;
    min-height: 92.8vh;
    margin: 0;
    border: red solid 13px;
    background: #edda77;
}

h1{
text-align:center;
}

button{
  padding:12px;
  margin:5px;
  font-size:18px;
  font-weight: bold;
  text-transform: uppercase;
}

label {
    font-weight: bold;
    text-transform: uppercase;
}

#productos {
  display: flex;
  flex-direction: column;
  
  & button{
    display:block;
    width:100%;
  }
}

#lista{
  margin-top:20px;
  background: red;
  padding:10px;
  border-radius:10px;
  display: flex;
  flex-direction: column;
  gap: 9px;
  & span {
    margin: 5px;
  }
}

.total{
  font-size:24px;
  font-weight:bold;
  margin-top:20px;
}

.item {
  align-items: center;
  display: flex;
  justify-content: space-between;
  font-size: 18px;
  font-weight: bold;
  background: white;
}

.venta {
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  font-weight: bold;
}

.turno-manana {
  background: #F4BF55; /* naranjita */
}

.turno-tarde {
  background: #d4b0ff; /* violetita */
}

.turno-test {
  background: #ccc; /* gris */
}

.item-detalle {
  margin-left: 10px;
  font-weight: normal;
}
</style>

</head>
<body>

<h1>🐓 Carnicerias 🐄</h1>

<button onclick="mostrarProductos()">➕ Agregar Producto</button>
<button onclick="vaciar()">🧹 Vaciar</button>

<div id="productos" style="display:none">
<button onclick="agregar('PROMO: Menudo - 2kg × 1000',600)">PROMO: Menudo - 2kg × $1.200</button>
<button onclick="agregar('PROMO: Alitas - 3kg × 5000',1866)">PROMO: ALITAS - 3kg × $5.600</button>
<button onclick="agregar('PROMO: Milas - 2kg × 16000',8000)">PROMO: MILAS - 2kg × $16.000</button>
<button onclick="agregar('PROMO: Patas - 2kg × 7000',3500)">PROMO: Patas - 2kg × $7.000</button>
<button onclick="agregar('PROMO: Chorizo - 2kg × 17500',6600)">PROMO: Chorizo - 2kg × $13.200</button>
<button onclick="agregar('PROMO: Morcilla - 2kg × 12200',4700)">PROMO: Morcilla - 2kg × $9.400</button>
<button onclick="agregar('Menudo',700)">Menudo - $700/kg</button>
<button onclick="agregar('Alitas',2000)">Alitas - $2.000/kg</button>
<button onclick="agregar('Pata y Muslo',3700)">Pata y Muslo $3.700/kg</button>
<button onclick="agregar('Pollo Entero',5000)">Pollo Entero - $5.000/kg</button>
<button onclick="agregar('Medallon',6500)">Medallon - $6.500/kg</button>
<button onclick="agregar('Pechuga',6500)">Pechuga - $6.500/kg</button>
<button onclick="agregar('Suprema',7500)">Suprema - $7.500/kg</button>
<button onclick="agregar('Milanesa',9000)">Milanesa - $9.000/kg</button>
<button onclick="agregar('Chorizo',7500)">Chorizo - $7.500/kg</button>
<button onclick="agregar('Morcilla',4800)">Morcilla - $4.800/kg</button>

</div>

<div id="lista"></div>

<div class="total">
Total: $<span id="total">0</span>
</div>

<h3>Método de pago</h3>

<label>
<input type="radio" name="pago" value="Efectivo" checked>
Efectivo
</label>

<label>
<input type="radio" name="pago" value="Transferencia">
Transferencia
</label>

<label>
<input type="radio" name="pago" value="Otro">
Otro
</label>
<br><br>

<button onclick="finalizarVenta()">💰 Finalizar venta</button>

<button onclick="mostrarTicket()">📄 Ticket</button>

<button onclick="verVentas()">📊 Ver ventas</button>

<h2>📊 Historial</h2>
<div id="historial"></div>
<script>

let total = 0
let carrito = []

let verVentas_bool = false
let verProductos_bool = false
let ultimoTicket = ""

function mostrarProductos(){
  verProductos_bool = !verProductos_bool

  document.getElementById("productos").style.display =
    verProductos_bool ? "flex" : "none"
}

function redondear100(numero){
return Math.ceil(numero/100)*100
}
function numeroValido(valor) {
  return !isNaN(valor) && isFinite(valor)
}

function agregar(nombre, precio) {
  
  let gramos = prompt("¿Cuántos gramos pesa?")
  if (!gramos) return;
  
  gramos = parseFloat(gramos)

if (!numeroValido(gramos) || gramos <= 0) {
  alert("Peso inválido")
  return
}
  let peso = gramos / 1000
  
  let subtotal = redondear100(peso * precio)
  
  let item = document.createElement("div")
  item.classList.add("item")
  
  // 👇 objeto real en carrito (referencia directa)
  let data = {
    nombre: nombre,
    pesoKg: peso,
    subtotal: subtotal,
    precio: precio
  }
  
  carrito.push(data)
  
  let texto = document.createElement("span")
  
  function actualizarTexto() {
    texto.innerText = data.nombre + " (" + data.pesoKg.toFixed(3) + "kg) = $" + data.subtotal
  }
  
  actualizarTexto()
  
  // ❌ BOTÓN ELIMINAR
  let botonEliminar = document.createElement("button")
  botonEliminar.innerText = "❌"
  
  botonEliminar.onclick = function() {
    item.remove()
    total -= data.subtotal
    document.getElementById("total").innerText = total
    carrito = carrito.filter(i => i !== data)
  }
  
  // ✏️ BOTÓN EDITAR
  let botonEditar = document.createElement("button")
  botonEditar.innerText = "✏️"
  
  botonEditar.onclick = function() {
    
    let nuevoGramos = prompt("Nuevo peso en gramos:", data.pesoKg * 1000)
    if (!nuevoGramos) return
    
    nuevoGramos = parseFloat(nuevoGramos)

if (!numeroValido(nuevoGramos) || nuevoGramos <= 0) {
  alert("Peso inválido")
  return
}
    let nuevoPeso = nuevoGramos / 1000
    
    // restar viejo
    total -= data.subtotal
    
    // recalcular
    data.pesoKg = nuevoPeso
    data.subtotal = redondear100(nuevoPeso * data.precio)
    
    // sumar nuevo
    total += data.subtotal
    
    // actualizar UI
    actualizarTexto()
    document.getElementById("total").innerText = total
    
  }
  
  item.appendChild(texto)
  item.appendChild(botonEditar) // ✏️ primero editar
  item.appendChild(botonEliminar) // ❌ después eliminar
  
  document.getElementById("lista").appendChild(item)
  
  total += subtotal
  document.getElementById("total").innerText = total
  
  document.getElementById("productos").style.display = "none"
}

function vaciar() {
  document.getElementById("lista").innerHTML = ""
  total = 0
  carrito = []
  document.getElementById("total").innerText = total
}

function finalizarVenta() {
  
  if (total == 0) return
  
  let metodo = document.querySelector('input[name="pago"]:checked').value
  
  let pagoCliente = null
  let vuelto = 0
  
  // 💵 Si es efectivo, pedir pago
  if (metodo === "Efectivo") {
    
    let input = prompt("¿Con cuánto paga el cliente?")
    
    if (!input) {
      input = total
    }
    
    pagoCliente = parseFloat(input)
    
    if (isNaN(pagoCliente)) {
      alert("Número inválido")
      finalizarVenta()
      return
    }
    
    vuelto = pagoCliente - total
    
    if (vuelto < 0) {
      alert("Falta dinero! Te debe $" + Math.abs(vuelto))
      return
    }
    
  }
  
  // 🧾 Crear ticket
  let ahora = new Date()
  
  let ticket = "🐔 POLLERÍA\n"
  ticket += ahora.toLocaleString() + "\n\n"
  
  carrito.forEach(i => {
    ticket += i.nombre + " - " + i.pesoKg.toFixed(3) + "Kg - $" + i.subtotal + "\n"
  })
  
  ticket += "\nTOTAL: $" + total + "\n"
  ticket += "PAGO: " + metodo + "\n"
  
  if (metodo === "Efectivo") {
    ticket += "RECIBIDO: $" + pagoCliente + "\n"
    ticket += "VUELTO: $" + vuelto + "\n"
  }
  
  // 💾 Guardar venta
  let ventas = JSON.parse(localStorage.getItem("ventas")) || []
  
  ventas.push({
    fecha: ahora.toLocaleDateString(),
    hora: ahora.toLocaleTimeString(),
    total: total,
    metodo: metodo,
    items: carrito.length ? carrito : null
  })
  
  localStorage.setItem("ventas", JSON.stringify(ventas))
  
  // 📢 Mostrar resumen rápido
  let resumen = "Venta: $" + total + " (" + metodo + ")"
  
  if (metodo === "Efectivo") {
    resumen += "\nVuelto: $" + vuelto
  }
  
  alert(resumen)
  
  ultimoTicket = ticket
  
  vaciar()
  renderHistorial()
}

function verVentas() {
  verVentas_bool = !verVentas_bool
  renderHistorial()
  
}

function obtenerTurno(horaStr) {
  
  // Detectar si es PM
  let esPM = horaStr.toLowerCase().includes("p")
  
  // Sacar la hora (ej: "6:28:38 p.m." → 6)
  let hora = parseInt(horaStr.split(":")[0])
  
  // Convertir a formato 24h
  if (esPM && hora !== 12) {
    hora += 12
  }
  
  if (!esPM && hora === 12) {
    hora = 0
  }
  
  // Mañana 9 a 14
  if (hora >= 9 && hora < 14) return "manana"
  
  // Tarde 17 a 21
  if (hora >= 17 && hora < 21) return "tarde"
  
  // Fuera de horario
  return "test"
  
}

function renderHistorial(){

let contenedor = document.getElementById("historial")
contenedor.innerHTML = ""

if (!verVentas_bool) {
  return
}
let ventas = JSON.parse(localStorage.getItem("ventas")) || []

let dias = {}

ventas.forEach(v=>{
if(!dias[v.fecha]) dias[v.fecha] = []
dias[v.fecha].push(v)
})

Object.keys(dias).reverse().forEach(dia=>{

let bloqueDia = document.createElement("div")

let titulo = document.createElement("h3")
titulo.innerText = "----- " + dia + " -----"

bloqueDia.appendChild(titulo)

let totalDia = 0
let kilosDia = 0

dias[dia].forEach(v=>{

let turno = obtenerTurno(v.hora)

let ventaDiv = document.createElement("div")
ventaDiv.classList.add("venta")

if(turno === "manana") ventaDiv.classList.add("turno-manana")
if(turno === "tarde") ventaDiv.classList.add("turno-tarde")
if(turno === "test") ventaDiv.classList.add("turno-test")

ventaDiv.innerText = v.hora + " - $" + v.total + " - " + (v.metodo == "Efectivo" ? "💵" : "📱")

// 👇 SOLO suma si NO es test
if(turno !== "test"){
totalDia += v.total
}

// Detalles
if(v.items){

v.items.forEach(i=>{
let item = document.createElement("div")
item.classList.add("item-detalle")
item.innerText = "| " + i.pesoKg.toFixed(3) + "Kg de " + i.nombre

ventaDiv.appendChild(item)

if(turno !== "test"){
kilosDia += i.pesoKg
}

})

}

bloqueDia.appendChild(ventaDiv)

})

// Totales del día
let resumen = document.createElement("div")
resumen.innerHTML = `
<b>Total del día:</b> $${totalDia}<br>
<b>Kilos vendidos:</b> ${kilosDia.toFixed(3)}Kg
`

bloqueDia.appendChild(resumen)

contenedor.appendChild(bloqueDia)

})
}
function mostrarTicket() {
  
  if (!ultimoTicket) {
    alert("No hay ticket reciente")
    return
  }
  
  // Mostrar ticket
  alert(ultimoTicket)
}
</script>

</body>
</html>
