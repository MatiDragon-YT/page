<script src="https://matidragon-yt.github.io/page/js/main.min.js"></script>
<script>
 // --- CONFIGURACIÓN: pega aquí tu string de redirecciones ---
  const redirectsText = `
  page/seeds -> page/proyects
  page/seeds/* -> page/proyects/*
  page/dyos -> page/mods/a
  `;

  // --- PARSEADOR: convierte cada línea en {pattern:RegExp, target:string} ---
  function parseRedirects(text) {
    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const rules = [];
    for (const line of lines) {
      const parts = line.split('->').map(p => p.trim());
      if (parts.length !== 2) continue;
      const src = parts[0];
      const dst = parts[1];

      // Escape regex special chars except '*'
      let reSrc = src.replace(/[-/\\^$+?.()|[\]{}]/g, '\\$&');
      // Replace wildcard '*' with capture group '(.*)'
      reSrc = reSrc.replace(/\\\*/g, '(.*)'); // because '*' was escaped
      // Anchor to full path (allow optional leading slash)
      const regex = new RegExp('^/?' + reSrc + '$');
      rules.push({ regex, target: dst });
    }
    return rules;
  }

  // --- APLICAR REGLAS: intenta redirigir la ruta actual ---
  function applyRedirects(rules, pathname, search, hash) {
    // Normalize: quitar leading slash para comparar con reglas definidas sin slash
    const pathNoSlash = pathname.replace(/^\/+/, '');
    for (const r of rules) {
      const m = pathNoSlash.match(r.regex);
      if (m) {
        // Construir destino sustituyendo '*' por capture groups $1, $2...
        let target = r.target;
        // Si target contiene '*' sustituimos por m[1], etc.
        // Soportamos múltiples '*' en target: reemplazamos secuencialmente.
        let captureIndex = 1;
        target = target.replace(/\*/g, () => (m[captureIndex++] || ''));

        // Asegurar leading slash
        if (!target.startsWith('/')) target = '/' + target;

        // Mantener query y hash si se desea (aquí los preservamos)
        const finalUrl = target + (search || '') + (hash || '');
        // Evitar bucle de redirección: si ya estamos en finalUrl, no redirigir
        if (finalUrl === pathname + (search || '') + (hash || '')) return null;
        return finalUrl;
      }
    }

    // Regla global: si la ruta termina en .md y no hubo match, cambiar a .html
    if (pathNoSlash.endsWith('.md')) {
      const target = '/' + pathNoSlash.replace(/\.md$/i, '.html') + (search || '') + (hash || '');
      if (target !== pathname + (search || '') + (hash || '')) return target;
    }

    return null;
  }

  // --- EJECUCIÓN en carga de la 404 ---
  (function() {
    const rules = parseRedirects(redirectsText);
    const pathname = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;

    const dest = applyRedirects(rules, pathname, search, hash);
    if (dest) {
      // Redirigir (replace para no dejar la 404 en el historial)
      window.location.replace(dest);
    }
  })();
</script>
