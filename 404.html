<!DOCTYPE html>

	<title>ERROR 404</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="https://matidragon-yt.github.io/page/css/main.css">
<script>

const redirectsText = `
page/seeds -> page/proyects
page/seeds.html -> page/proyects.html
page/seeds/* -> page/proyects/*
page/dyos -> page/mods/o
`;

// Parseo de reglas
function parseRedirects(text) {
  return text.split(/\r?\n/).map(l => l.trim()).filter(Boolean).map(line => {
    const parts = line.split('->').map(p => p.trim());
    if (parts.length !== 2) return null;
    let [src, dst] = parts;
    // Escape regex special chars except *
    let reSrc = src.replace(/[-/\\^$+?.()|[\]{}]/g, '\\$&').replace(/\\\*/g, '(.*)');
    const regex = new RegExp('^/?' + reSrc + '$', 'i');
    return { regex, target: dst };
  }).filter(Boolean);
}

function applyRedirects(rules, pathname, search, hash) {
  const pathNoSlash = pathname.replace(/^\/+/, '');
  for (const r of rules) {
    const m = pathNoSlash.match(r.regex);
    if (m) {
      let target = r.target;
      let idx = 1;
      target = target.replace(/\*/g, () => (m[idx++] || ''));
      if (!target.startsWith('/')) target = '/' + target;
      const finalUrl = target + (search || '') + (hash || '');
      if (finalUrl === pathname + (search || '') + (hash || '')) return null;
      return finalUrl;
    }
  }
  // regla global .md -> .html si no hubo match
  if (pathNoSlash.match(/\.md$/i)) {
    const target = '/' + pathNoSlash.replace(/\.md$/i, '.html') + (search || '') + (hash || '');
    if (target !== pathname + (search || '') + (hash || '')) return target;
  }
  return null;
}

const rules = parseRedirects(redirectsText);
const pathname = window.location.pathname;
const search = window.location.search;
const hash = window.location.hash;
const dest = applyRedirects(rules, pathname, search, hash);
if (dest) {
  location.replace(dest);
};


</script>
