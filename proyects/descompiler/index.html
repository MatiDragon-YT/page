<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCM Decompiler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <div class="app-header">
        <h1>🔬 SCM Decompiler</h1>
        <input type="file" id="fileInput" accept="*/*" style="display:none">
        <button class="btn btn-accent btn-sm" onclick="document.getElementById('fileInput').click()">📁 Upload file</button>
        <button class="btn btn-outline-accent btn-outline-primary btn-sm" onclick="showHexModal()">✏️ Paste Hex</button>
        <button class="btn btn-outline-accent btn-outline-secondary btn-sm" onclick="runDecompile()">▶️ Descompiler</button>
        <span style="flex:1"></span>
        <button class="btn btn-sm btn-outline-info" onclick="toggleConfig()">⚙️ SASCM.ini</button>
    </div>

    <div class="main-container">
        <div class="panel" id="hexPanel">
            <div class="panel-header">
                📊 HEX-View
                <span style="flex:1"></span>
                <button class="btn btn-sm btn-outline-light" id="btnCopySelection" onclick="copySelection()" title="Copy selection (or all)">📋 Copy</button>
                <span id="statsBar"></span>
            </div>
            <div id="hexContainer">
                <div id="hexScrollArea">
                    <div id="hexSpacer"></div>
                </div>
                <canvas id="hexCanvas"></canvas>
                <canvas id="selectionCanvas"></canvas>
            		<canvas id="xrefCanvas"></canvas>
            </div>
        </div>
        <div class="panel" id="outputPanel">
            <div class="panel-header">📝 Code descompiled <span style="flex:1"></span><button class="btn btn-sm btn-outline-light" onclick="copyOutput()">📋 Copy</button></div>
            <textarea id="outputCode" readonly placeholder="Result..."></textarea>
        </div>
        <div class="panel" id="configPanel">
            <div class="panel-header">⚙️ SASCM.ini <span style="flex:1"></span><button class="btn btn-sm btn-close btn-close-white" onclick="toggleConfig()"></button></div>
            <div class="panel-body p-2 d-flex flex-column gap-2"><textarea class="config-editor form-control" id="sascmEditor" rows="14"></textarea><button class="btn btn-sm btn-accent" onclick="applyConfig()">Aplicate</button></div>
        </div>
    </div>
    <div class="tooltip-hex" id="hexTooltip"></div>
    <div class="modal fade" id="hexModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Paste Hex</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body"><textarea id="hexTextarea" class="form-control bg-dark text-light" rows="6" placeholder="00 00 01 00 ..."></textarea></div>
                <div class="modal-footer border-secondary"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-accent" onclick="loadHexFromModal()">Upload</button></div>
            </div>
        </div>
    </div>
    <div id="ctxMenu">
        <div class="ctx-item" data-action="copyHexSpaces">Copy Hex (with spaces)</div>
        <div class="ctx-item" data-action="copyHexNoSpaces">Copy Hex (not spaces)</div>
        <div class="ctx-item" data-action="copyText">Copy with text</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./main.js"></script>
</body>

</html>
