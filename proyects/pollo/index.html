<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnicerias - El Sabrosón</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            min-height: 92.8vh;
            margin: 0;
            border: red solid 13px;
            background: #edda77;
        }
        h1 { text-align: center; }
        button {
            padding: 12px;
            margin: 5px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
        }
        button:hover { background: #C7A363; }
        label { font-weight: bold; text-transform: uppercase; }
        #productos {
            display: flex;
            flex-direction: column;
        }
        #productos button { display: block; width: 100%; }
        #lista {
            margin-top: 20px;
            background: red;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        #lista span { margin: 5px; }
        .total { font-size: 24px; font-weight: bold; margin-top: 20px; }
        .item {
            align-items: center;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            background: white;
        }
        .venta {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-weight: bold;
        }
        .turno-manana { background: #F4BF55; }
        .turno-tarde { background: #d4b0ff; }
        .turno-test { background: #ccc; }
        .item-detalle { margin-left: 10px; font-weight: normal; }

        #dashboard {
            background: #fff;
            border: 3px solid #b22222;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-around;
            gap: 12px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        #dashboard .metrica {
            text-align: center;
            min-width: 100px;
        }
        #dashboard .valor {
            font-size: 22px;
            display: block;
            margin-top: 4px;
        }
        .ganancia-positiva { color: green; }
        .ganancia-negativa { color: red; }
        #dashboard button {
            font-size: 14px;
            padding: 10px 16px;
            background: #ffeeba;
            border: 2px solid #b22222;
            border-radius: 8px;
            cursor: pointer;
        }
        #btnSobras {
            background: #d4edda;
            border-color: #28a745;
            display: none; /* se muestra solo después de las 21 */
        }
        .resumen-dia {
            margin-top: 6px;
            font-size: 15px;
            background: rgba(255,255,255,0.7);
            padding: 8px;
            border-radius: 6px;
        }
        .resumen-general {
            background: #b22222;
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>🐓 Carnicerias 🐄</h1>

    <div id="dashboard">
        <div class="metrica">
            💵 Ventas hoy
            <span class="valor" id="ventasHoy">$0</span>
        </div>
        <div class="metrica">
            📦 Inversión hoy
            <span class="valor" id="inversionHoy">$0</span>
        </div>
        <div class="metrica">
            📈 Ganancia neta
            <span class="valor" id="gananciaNeta">$0</span>
        </div>
        <button onclick="registrarInversion()">💰 Registrar Inversión</button>
        <button id="btnSobras" onclick="registrarSobras()">🥩 Sobras</button>
    </div>

    <button onclick="mostrarProductos()">➕ Agregar Producto</button>
    <button onclick="vaciar()">🧹 Vaciar</button>

    <div id="productos" style="display:none">
        <!-- PROMOCIONES (arriba, orden alfabético) -->
<button onclick="agregar('PROMO: Alitas - 2kg × 4500',2250)">PROMO: ALITAS - 2kg × $4.500</button>
<button onclick="agregar('PROMO: Alitas - 3kg × 6000',2000)">PROMO: ALITAS - 3kg × $6.000</button>
<button onclick="agregar('PROMO: Menudo - 2kg × 1000',500)">PROMO: Menudo - 2kg × $1.000</button>
<button onclick="agregar('PROMO: Milas - 2kg × 19000',9500)">PROMO: Milas - 2kg × $19.000</button>
<button onclick="agregar('PROMO: Milas - 3kg × 27000',9000)">PROMO: Milas - 3kg × $27.000</button>
<button onclick="agregar('PROMO: Patas - 2kg × 9000',4750)">PROMO: Patas - 2kg × $9.500</button>
<button onclick="agregar('PROMO: Patas - 3kg × 12000',4166)">PROMO: Patas - 3kg × $12.500</button>

<!-- PRODUCTOS (orden alfabético) -->
<button onclick="agregar('Alitas',2500)">Alitas - $2.500/kg</button>
<button onclick="agregar('Chorizo',9000)">Chorizo - $9.000/kg</button>
<button onclick="agregar('Medallon',7000)">Medallon - $7.000/kg</button>
<button onclick="agregar('Menudo',600)">Menudo - $600/kg</button>
<button onclick="agregar('Milanesa',10000)">Milanesa - $10.000/kg</button>
<!--<button onclick="agregar('Merluza',6000)">Merluza - $6.000/kg</button>-->
<!--<button onclick="agregar('Morcilla',3500)">Morcilla - $3.500/kg</button>-->
<button onclick="agregar('Pata y Muslo',5000)">Pata y Muslo $5000/kg</button>
<button onclick="agregar('Patitas',14000)">Patitas - $14.000/kg</button>
<button onclick="agregar('Pechuga',8000)">Pechuga - $8.000/kg</button>
<button onclick="agregar('Pollo Entero',5700)">Pollo Entero - $5.700/kg</button>
<button onclick="agregar('Suprema',9000)">Suprema - $9.000/kg</button>
    </div>

    <div id="lista"></div>
    <div class="total">Total: $<span id="total">0</span></div>

    <h3>Método de pago</h3>
    <label><input type="radio" name="pago" value="Efectivo" checked> Efectivo</label>
    <label><input type="radio" name="pago" value="Transferencia"> Transferencia</label>
    <label><input type="radio" name="pago" value="Otro"> Otro</label>
    <br><br>
    <button onclick="finalizarVenta()">💰 Finalizar venta</button>
    <button onclick="mostrarTicket()">📄 Ticket</button>
    <button onclick="verVentas()">📊 Ver ventas</button>

    <h2>📊 Historial</h2>
    <div id="historial"></div>

    <script>
        let total = 0;
        let carrito = [];
        let verVentas_bool = false;
        let verProductos_bool = false;
        let ultimoTicket = "";

        window.addEventListener("DOMContentLoaded", () => {
            actualizarDashboard();
            verificarHoraSobras();
            setInterval(() => {
                verificarHoraSobras();
                actualizarDashboard();
                if (verVentas_bool) renderHistorial();
            }, 60000);
        });

        function fechaHoy() {
            return new Date().toLocaleDateString();
        }

        function horaActual() {
            return new Date().getHours();
        }

        function verificarHoraSobras() {
            const btn = document.getElementById("btnSobras");
            btn.style.display = horaActual() >= 21 ? "inline-block" : "none";
        }

        function actualizarDashboard() {
            const hoy = fechaHoy();
            const ventas = JSON.parse(localStorage.getItem("ventas")) || [];
            const inversiones = JSON.parse(localStorage.getItem("inversiones")) || {};
            const sobrantes = JSON.parse(localStorage.getItem("sobrantes")) || {};

            let totalVentasHoy = 0;
            ventas.forEach(v => {
                if (v.fecha === hoy) totalVentasHoy += v.total;
            });

            let inversionHoy = inversiones[hoy] || 0;
            let sobranteHoy = sobrantes[hoy] || 0;
            let ganancia = totalVentasHoy - inversionHoy + sobranteHoy;

            document.getElementById("ventasHoy").innerText = "$" + totalVentasHoy;
            document.getElementById("inversionHoy").innerText = "$" + inversionHoy;
            const gananciaSpan = document.getElementById("gananciaNeta");
            gananciaSpan.innerText = "$" + ganancia;
            gananciaSpan.className = "valor " + (ganancia >= 0 ? "ganancia-positiva" : "ganancia-negativa");

            if (sobranteHoy > 0) {
                gananciaSpan.innerText += " (incluye $" + sobranteHoy + " en sobrantes)";
            }
        }

        function registrarSobras() {
            const input = prompt("¿De la mercadería que quedó, cuánto hay más o menos de plata? ($)");
            if (input === null) return;
            const monto = parseFloat(input);
            if (isNaN(monto) || monto < 0) {
                alert("Monto inválido");
                return;
            }
            const sobrantes = JSON.parse(localStorage.getItem("sobrantes")) || {};
            sobrantes[fechaHoy()] = monto;
            localStorage.setItem("sobrantes", JSON.stringify(sobrantes));
            actualizarDashboard();
            if (verVentas_bool) renderHistorial();
            alert("✅ Sobrante registrado: $" + monto);
        }

        function registrarInversion() {
            const input = prompt("¿Cuánta plata invertiste hoy? ($)");
            if (input === null) return;
            const monto = parseFloat(input);
            if (isNaN(monto) || monto < 0) {
                alert("Monto inválido");
                return;
            }
            const inversiones = JSON.parse(localStorage.getItem("inversiones")) || {};
            inversiones[fechaHoy()] = monto;
            localStorage.setItem("inversiones", JSON.stringify(inversiones));
            actualizarDashboard();
            if (verVentas_bool) renderHistorial();
            alert("✅ Inversión registrada: $" + monto);
        }

        function mostrarProductos() {
            verProductos_bool = !verProductos_bool;
            document.getElementById("productos").style.display = verProductos_bool ? "flex" : "none";
        }

        function redondear100(numero) { return Math.ceil(numero/100)*100; }
        function numeroValido(valor) { return !isNaN(valor) && isFinite(valor); }

        function agregar(nombre, precio) {
            precio += 100
            let gramos = prompt("¿Cuántos gramos pesa?");
            if (!gramos) return;
            gramos = parseFloat(gramos);
            if (!numeroValido(gramos) || gramos <= 0) { alert("Peso inválido"); return; }
            let peso = gramos / 1000;
            let subtotal = redondear100(peso * precio);

            let item = document.createElement("div");
            item.classList.add("item");
            let data = { nombre: nombre, pesoKg: peso, subtotal: subtotal, precio: precio };
            carrito.push(data);
            let texto = document.createElement("span");
            function actualizarTexto() { texto.innerText = data.nombre + " (" + data.pesoKg.toFixed(3) + "kg) = $" + data.subtotal; }
            actualizarTexto();

            let botonEliminar = document.createElement("button");
            botonEliminar.innerText = "❌";
            botonEliminar.onclick = function() {
                item.remove();
                total -= data.subtotal;
                document.getElementById("total").innerText = total;
                carrito = carrito.filter(i => i !== data);
            };

            let botonEditar = document.createElement("button");
            botonEditar.innerText = "✏️";
            botonEditar.onclick = function() {
                let nuevoGramos = prompt("Nuevo peso en gramos:", data.pesoKg * 1000);
                if (!nuevoGramos) return;
                nuevoGramos = parseFloat(nuevoGramos);
                if (!numeroValido(nuevoGramos) || nuevoGramos <= 0) { alert("Peso inválido"); return; }
                let nuevoPeso = nuevoGramos / 1000;
                total -= data.subtotal;
                data.pesoKg = nuevoPeso;
                data.subtotal = redondear100(nuevoPeso * data.precio);
                total += data.subtotal;
                actualizarTexto();
                document.getElementById("total").innerText = total;
            };

            item.appendChild(texto);
            item.appendChild(botonEditar);
            item.appendChild(botonEliminar);
            document.getElementById("lista").appendChild(item);

            total += subtotal;
            document.getElementById("total").innerText = total;
            document.getElementById("productos").style.display = "none";
        }

        function vaciar() {
            document.getElementById("lista").innerHTML = "";
            total = 0;
            carrito = [];
            document.getElementById("total").innerText = total;
        }

        function finalizarVenta() {
            if (total == 0) return;
            let metodo = document.querySelector('input[name="pago"]:checked').value;
            let pagoCliente = null, vuelto = 0;
            if (metodo === "Efectivo") {
                let input = prompt("¿Con cuánto paga el cliente?");
                if (!input) input = total;
                pagoCliente = parseFloat(input);
                if (isNaN(pagoCliente)) { alert("Número inválido"); return; }
                vuelto = pagoCliente - total;
                if (vuelto < 0) { alert("Falta dinero! Te debe $" + Math.abs(vuelto)); return; }
            }
            let ahora = new Date();
            let ticket = "🐔 POLLERÍA\n" + ahora.toLocaleString() + "\n\n";
            carrito.forEach(i => ticket += i.nombre + " - " + i.pesoKg.toFixed(3) + "Kg - $" + i.subtotal + "\n");
            ticket += "\nTOTAL: $" + total + "\nPAGO: " + metodo + "\n";
            if (metodo === "Efectivo") ticket += "RECIBIDO: $" + pagoCliente + "\nVUELTO: $" + vuelto + "\n";

            let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
            ventas.push({ fecha: ahora.toLocaleDateString(), hora: ahora.toLocaleTimeString(), total: total, metodo: metodo, items: carrito.length ? carrito : null });
            localStorage.setItem("ventas", JSON.stringify(ventas));

            alert("Venta: $" + total + " (" + metodo + ")" + (metodo === "Efectivo" ? "\nVuelto: $" + vuelto : ""));
            ultimoTicket = ticket;
            vaciar();
            actualizarDashboard();
            if (verVentas_bool) renderHistorial();
        }

        function verVentas() {
            verVentas_bool = !verVentas_bool;
            renderHistorial();
        }

        // ✅ NUEVA FUNCIÓN: convierte hora en formato local a minutos desde medianoche
        function parseHoraAMinutos(horaStr) {
            // Ejemplos: "6:28:38 p.m." o "18:28:38"
            let str = horaStr.toLowerCase().trim();
            let esPM = str.includes("p.m.") || str.includes("pm");
            let esAM = str.includes("a.m.") || str.includes("am");
            
            // Eliminar los sufijos AM/PM para extraer números
            str = str.replace(/a\.m\.|p\.m\.|am|pm/gi, "").trim();
            let partes = str.split(":");
            let horas = parseInt(partes[0]) || 0;
            let minutos = parseInt(partes[1]) || 0;

            // Ajuste por AM/PM (sin tocar medianoche/mediodía)
            if (esPM && horas !== 12) horas += 12;
            if (esAM && horas === 12) horas = 0;

            return horas * 60 + minutos;
        }

        function obtenerTurno(horaStr) {
            // Rangos con tolerancia de 10 minutos:
            // Mañana: 09:00 a 14:10 inclusive
            // Tarde: 17:00 a 21:10 inclusive
            const minutos = parseHoraAMinutos(horaStr);
            const mananaInicio = 9 * 60;      // 09:00
            const mananaFin = 14 * 60 + 10;   // 14:10
            const tardeInicio = 17 * 60;      // 17:00
            const tardeFin = 21 * 60 + 10;    // 21:10

            if (minutos >= mananaInicio && minutos <= mananaFin) return "manana";
            if (minutos >= tardeInicio && minutos <= tardeFin) return "tarde";
            return "test";
        }

        function renderHistorial() {
            let contenedor = document.getElementById("historial");
            contenedor.innerHTML = "";
            if (!verVentas_bool) return;

            let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
            let inversiones = JSON.parse(localStorage.getItem("inversiones")) || {};
            let sobrantes = JSON.parse(localStorage.getItem("sobrantes")) || {};

            let dias = {};
            ventas.forEach(v => {
                if (!dias[v.fecha]) dias[v.fecha] = [];
                dias[v.fecha].push(v);
            });

            let totalGeneral = 0, totalEfectivoGeneral = 0, totalTransferenciaGeneral = 0;

            Object.keys(dias).reverse().forEach(dia => {
                let bloqueDia = document.createElement("div");
                let titulo = document.createElement("h3");
                titulo.innerText = "----- " + dia + " -----";
                bloqueDia.appendChild(titulo);

                let totalDia = 0, kilosDia = 0, efectivoDia = 0, transferenciaDia = 0;

                dias[dia].forEach(v => {
                    let turno = obtenerTurno(v.hora);
                    let ventaDiv = document.createElement("div");
                    ventaDiv.classList.add("venta");
                    if (turno === "manana") ventaDiv.classList.add("turno-manana");
                    if (turno === "tarde") ventaDiv.classList.add("turno-tarde");
                    if (turno === "test") ventaDiv.classList.add("turno-test");
                    ventaDiv.innerText = v.hora + " - $" + v.total + " - " + (v.metodo == "Efectivo" ? "💵" : "📱");

                    if (turno !== "test") {
                        totalDia += v.total;
                        if (v.metodo === "Efectivo") efectivoDia += v.total;
                        else transferenciaDia += v.total;
                    }
                    if (v.items) {
                        v.items.forEach(i => {
                            let item = document.createElement("div");
                            item.classList.add("item-detalle");
                            item.innerText = "| " + i.pesoKg.toFixed(3) + "Kg de " + i.nombre;
                            ventaDiv.appendChild(item);
                            if (turno !== "test") kilosDia += i.pesoKg;
                        });
                    }
                    bloqueDia.appendChild(ventaDiv);
                });

                let inversionDia = inversiones[dia] || 0;
                let sobranteDia = sobrantes[dia] || 0;
                let gananciaDia = totalDia - inversionDia + sobranteDia;

                let resumen = document.createElement("div");
                resumen.classList.add("resumen-dia");
                resumen.innerHTML = `
                    <b>🧾 Total del día:</b> $${totalDia}<br>
                    <b>💵 Efectivo:</b> $${efectivoDia} | <b>📱 Transferencia/Otro:</b> $${transferenciaDia}<br>
                    <b>📦 Inversión:</b> $${inversionDia} | <b>🥩 Sobrante:</b> $${sobranteDia}<br>
                    <b>📈 Ganancia real:</b> <span style="color:${gananciaDia >= 0 ? 'green' : 'red'}">$${gananciaDia}</span><br>
                    <b>⚖️ Kilos vendidos:</b> ${kilosDia.toFixed(3)}Kg
                `;
                bloqueDia.appendChild(resumen);
                contenedor.appendChild(bloqueDia);

                totalGeneral += totalDia;
                totalEfectivoGeneral += efectivoDia;
                totalTransferenciaGeneral += transferenciaDia;
            });

            if (totalGeneral > 0) {
                let resumenGeneral = document.createElement("div");
                resumenGeneral.classList.add("resumen-general");
                resumenGeneral.innerHTML = `
                    <h3 style="margin:0 0 8px 0;">📊 TOTAL ACUMULADO</h3>
                    <b>💰 Total general:</b> $${totalGeneral}<br>
                    <b>💵 Total en efectivo:</b> $${totalEfectivoGeneral}<br>
                    <b>📱 Total transferencia/otro:</b> $${totalTransferenciaGeneral}
                `;
                contenedor.appendChild(resumenGeneral);
            }
        }

        function mostrarTicket() {
            if (!ultimoTicket) { alert("No hay ticket reciente"); return; }
            alert(ultimoTicket);
        }
    </script>
</body>
</html>
